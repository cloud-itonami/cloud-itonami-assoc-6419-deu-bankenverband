name: ci
on: [push, pull_request]
jobs:
  test:
    strategy: {matrix: {java: [17, 21]}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "${{ matrix.java }}"}
      - uses: DeLaGuardo/setup-clojure@13.4
        with: {cli: latest, github-token: "${{ secrets.GITHUB_TOKEN }}"}
      - uses: actions/setup-node@v4
        with: {node-version: "22"}
      - name: Enforce Kotoba production source authority
        run: |
          if find src -type f \( -name '*.clj' -o -name '*.cljc' -o -name '*.cljs' \) -print -quit | grep -q .; then exit 1; fi
          test "$(find src -type f -name '*.kotoba' | wc -l)" -eq 1
      - run: clojure -M:test
      - run: clojure -M:lint
